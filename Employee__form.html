<!DOCTYPE html>
<html>

<head>
    <title>Employee Form</title>
</head>

<body>
    <h2>Employee Information Form</h2>
    <form action="/submit" method="post">
        <!-- Employee Name -->
        <label>Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <!-- Employee ID -->
        <label for="empid">Employee ID:</label><br>
        <input type="text" id="empid" name="empid" required><br><br>

        <!-- <employee age></employee> -->
        <label for="empage">Employee Age</label><br>
        <input type="number" id="age" name="emp age" required><br><br>



        <!-- <employee email></employee> -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <!-- Phone -->
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone"><br><br>
        <! <!-- Department -->
            <label for="department">Department:</label><br>
            <select id="department" name="department">
                <option value="hr">HR</option>
                <option value="finance">Finance</option>
                <option value="it">IT</option>
                <option value="marketing">Marketing</option>
            </select><br><br>

            <!-- Gender -->
            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br><br>

            <!-- Address -->
            <label for="address">Address:</label><br>
            <textarea id="address" name="address" rows="4" cols="40"></textarea><br><br>

            <!-- Submit -->
            <input type="submit" value="Submit">
    </form>
</body>

</html>
