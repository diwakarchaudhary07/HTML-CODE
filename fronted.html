<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NEXA</title>
    <link rel="icon" type="image/x-icon" href="./image.png" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
        }

        header {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
        }

        header h1 {
            font-size: 3em;
            margin: 0;
        }

        nav {
            display: flex;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: #ffd700;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: #fff;
            color: #333;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            margin-top: 0;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <header>
        <h1>Welcome </h1>
        <p>Beautiful & Simple Design</p>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
    <div class="container">
        <div class="card">
            <h2>Frontend Card</h2>
            <p>This is a simple card with shadow and rounded corners.</p>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 My Frontend Page</p>
    </footer>
</body>

</html>
