<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NEXA</title>
    <link rel="icon" type="image/png" href="./image.png">

    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: #70c5e0;
            align-items: center;
        }

        header {
            background: #91c73f;

            color: white;
            padding: 15px;
            align-items: flex-end;
            font-size: 30px;
            display: flex;
        }

        nav {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 10px;
            display: flex;
            gap: 20px;
        }

        nav a {

            align-items: center;
            text-decoration: none;
            color: #4285f4;
            font-weight: bold;
            display: flex;
            gap: 20px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 15px;
            margin-bottom: 20px;
        }

        .btn {
            background: #34a853;
            /* Google Green */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn:hover {
            background: #2c8c46;
        }
    </style>
</head>

<body>

    <header>NEXA ALLOUNDER</header>


    <nav>
        <a href="#">Home</a>
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="#">Contact us</a>
    </nav>


    <div class="container">
        <div class="card">
            <h2>Welcome!</h2>
            <p>Here all product avilabel for you uses </p>
            <button class="btn">Get Started</button>
        </div>
    </div>

</body>

</html>
