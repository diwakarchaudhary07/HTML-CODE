<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Priority</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="./priority.css">

    <!-- Internal CSS -->
    <style>
        h1 {
            color: green;
        }
    </style>

</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color: gray;">
        This is CSS priority comparison class
    </h1>

</body>

</html>



<!-- What Happens Here?
->External CSS says → red
->Internal CSS says → green
->Inline CSS says → gray

Final Output Color → gray
Because Inline has highest priority. -->
