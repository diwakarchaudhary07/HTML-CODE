<!-- Internal CSS
📘 Definition
Internal CSS is written inside the <style> tag
within the <head> section. -->

✅ Code
<!DOCTYPE html>
<html>

<head>
    <title>Internal CSS</title>

    <style>
        h1 {
            color: gray;
            background-color: whitesmoke;
        }
    </style>
</head>

<body>
    <h1>This is Internal CSS</h1>
</body>

</html>
