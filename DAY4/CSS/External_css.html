<!-- External CSS
📘 Definition
External CSS is written in a separate .css file
and linked with HTML using the <link> tag.

📄 external.css
h1 {
    color: gray;
    background-color: whitesmoke;
}


📄 file.html -->

<!DOCTYPE html>
<html>

<head>
    <title>External CSS</title>
    <link rel="stylesheet" href="./external.css">
</head>

<body>
    <h1>This is External CSS</h1>
</body>

</html>




Both File external.css and file.html Are Linked with the help of
<link> Tag
<link rel="stylesheet" href="./external.css">
